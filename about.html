  <main class="wrap page prose">
    <h1>運営方針</h1>
    <p>PerkIndexは、クレジットカードとホテル特典を、価格・特典・条件の差分で比較することを目的とした比較メディアです。</p>
    <ul>
      <li>主観的なおすすめを創作しない</li>
      <li>価格と適用条件を分離して扱う</li>
      <li>取得時点の公開情報を基準に整理する</li>
      <li>条件が不明な案件は強く推さない</li>
    </ul>
    <p>掲載内容は更新時点の公開情報に基づきます。申込・予約前には必ず公式サイトで最新条件をご確認ください。</p>
  </main>
